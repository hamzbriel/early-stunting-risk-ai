{% extends "base.html" %}

{% block extra_js %}
<script src="{{ url_for('static', path='js/result.js') }}"></script>
{% endblock %}

{% block content %}
<div class="bg-gray-50 py-12">
    <div class="container mx-auto px-4 max-w-2xl">
        <div id="loading-message" class="text-center py-20 text-xl font-semibold">Memuat hasil prediksi...</div>

        <div id="result-content" class="hidden bg-white p-8 rounded-xl shadow-lg">
            <h1 class="text-2xl font-bold mb-4">Hasil Prediksi</h1>
            <div class="mb-6">
                <span class="text-sm text-gray-500">Tingkat Risiko:</span>
                <div id="res-prediction" class="text-4xl font-bold text-emerald-600"></div>
                <div id="res-confidence" class="text-lg text-gray-700"></div>
            </div>

            <h2 class="font-semibold mb-2">Probabilitas</h2>
            <div id="res-probabilities" class="mb-6"></div>

            <h2 class="font-semibold mb-2">Rekomendasi</h2>
            <p id="res-recommendation" class="text-gray-700 italic"></p>

            <div class="mt-8 flex gap-4">
                <a href="/prediction" class="btn btn-primary flex-1 text-center">Prediksi Lagi</a>
                <a href="/" class="btn btn-outline flex-1 text-center">Kembali ke Beranda</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
